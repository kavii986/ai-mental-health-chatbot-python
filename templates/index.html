<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mental Health Support Chatbot</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="icon" href="data:," />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>Mental Health Support Chatbot</h1>
        <img
          class="hero-img"
          src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
          alt="Chatbot Icon"
      />

        <p class="sub">Commands: <b>help</b>, <b>reset</b>, <b>exit</b></p>
        
        <p class="tagline">A supportive chatbot for stress, anxiety, and mood support.</p>


        <div class="actions">
          <button id="clearBtn" class="secondary-btn">Clear Chat</button>
        </div>
      </div>

      <div id="chatBox" class="chat-box"></div>

      <div class="input-area">
        <input id="userInput" type="text" placeholder="Type your message..." />
        <button id="sendBtn">Send</button>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
